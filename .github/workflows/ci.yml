name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node:
    name: Build & test (Node, ${{ matrix.os }})
    # Ares is a Windows-first product (PowerShell tools, Tauri shell), yet the
    # test suite historically only ran on Linux. Run the same build + tests on
    # both Ubuntu and Windows so platform-specific regressions surface in CI.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      # No version here on purpose — action-setup reads pnpm from the
      # "packageManager" field in package.json (pinning both errors out).
      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      # The npm-ci equivalent for a pnpm workspace: reproducible, lockfile-pinned.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Test
        run: node --test tests/*.test.mjs

  coverage:
    name: Coverage (Node built-in)
    # Zero-dependency coverage via Node 22's built-in test runner. No c8/nyc —
    # --experimental-test-coverage prints an lcov-style summary table to the log.
    # Linux-only is fine here; this measures coverage, not platform behavior.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      # --experimental-test-coverage is a Node 22 feature; the matrix job above
      # already pins node-version 22, so this flag is safe to use here.
      - name: Test with coverage
        run: node --test --experimental-test-coverage tests/*.test.mjs

  rust:
    name: Build (Rust desktop shell)
    # The Tauri crate is Windows-first (windows-sys / WebView2). Building on a
    # Windows runner matches the real target and avoids the Linux webkit2gtk
    # system-dependency dance. Packaging the installer is intentionally skipped
    # here — this just proves the shell compiles.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # tauri-build embeds the frontend (frontendDist: ../dist) at compile time,
      # so the web bundle must exist before cargo build. This is the vite build
      # only — the NSIS installer and the heavy runtime bundle are NOT built here.
      - name: Build web frontend
        run: pnpm --filter ares-tauri build:web

      # tauri-build validates that the bundle's `runtime/` resource path exists at
      # compile time. The real runtime (bundled node + Playwright) is produced by
      # `build:runtime` at packaging time, which we deliberately skip in CI — a
      # one-file stub satisfies the existence check so cargo build can prove the
      # shell compiles.
      - name: Stub the runtime resource dir
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force tauri/src-tauri/runtime | Out-Null
          Set-Content tauri/src-tauri/runtime/.ci-placeholder "stub; real runtime is built by build:runtime at packaging time"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: tauri/src-tauri

      - name: cargo build
        run: cargo build --manifest-path tauri/src-tauri/Cargo.toml
