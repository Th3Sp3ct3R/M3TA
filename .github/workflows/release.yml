name: Release

# Push a version tag (e.g. v0.11.0) and this builds the signed Windows
# installer, generates the updater manifest (latest.json), and publishes a
# GitHub release. The in-app updater polls
# github.com/clout2buy/Ares/releases/latest/download/latest.json, so a new
# release is what the running app sees as "a new update is available".
#
# Every artifact is signed with the Tauri minisign key (TAURI_SIGNING_PRIVATE_KEY
# secret); the app embeds the matching public key and refuses any unsigned or
# tampered update. Bump `version` in tauri/src-tauri/tauri.conf.json before
# tagging — the tag and that version should match.

on:
  push:
    tags:
      - "v*"

# tauri-action needs to create the release and upload assets.
permissions:
  contents: write

jobs:
  release:
    name: Build & publish Windows installer
    # Windows-first shell (WebView2 / windows-sys), and NSIS only builds on Windows.
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Build the TS workspace so packages are coherent (parity with the local
      # `desktop:installer` script).
      - name: Build workspace
        run: pnpm build

      # Bundle the embedded node + CLI runtime into tauri/src-tauri/runtime/.
      # tauri-build validates this resource path exists at compile time, and the
      # app launches the daemon/Garrison from it.
      - name: Build embedded runtime
        run: pnpm --filter ares-tauri build:runtime

      # Builds the NSIS installer, signs it + emits latest.json, creates the
      # release, and uploads the installer, its .sig, and latest.json.
      - name: Build, sign, and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Ares ${{ github.ref_name }}"
          releaseBody: "Automated release. The desktop app will offer this as an in-app update."
          releaseDraft: false
          prerelease: false
          args: --bundles nsis

  release-linux:
    name: Build & publish Linux installers
    # Runs AFTER Windows so both jobs write into the same release and
    # tauri-action MERGES latest.json (windows + linux updater entries) instead
    # of racing and clobbering each other. The embedded runtime script is
    # platform-aware: on this runner it bundles a Linux node binary.
    needs: release
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      # WebKitGTK 4.1 + friends — the Tauri v2 Linux build chain.
      - name: Install Linux build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            libayatana-appindicator3-dev librsvg2-dev patchelf \
            build-essential curl wget file libssl-dev libxdo-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace
        run: pnpm build

      - name: Build embedded runtime
        run: pnpm --filter ares-tauri build:runtime

      # AppImage feeds the in-app auto-updater (the only Linux format Tauri's
      # updater supports); the .deb is for people who prefer a real install.
      - name: Build, sign, and publish Linux bundles
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          projectPath: tauri
          tagName: ${{ github.ref_name }}
          releaseName: "Ares ${{ github.ref_name }}"
          releaseBody: "Automated release. The desktop app will offer this as an in-app update."
          releaseDraft: false
          prerelease: false
          args: --bundles appimage,deb
